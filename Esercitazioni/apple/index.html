<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link favicon -->
    <link rel="icon" type="image/x-icon" href="imgs/favicon.ico">

    <!-- Link esterno file CSS -->
    <link rel="stylesheet" href="css/style.css">

    <title>Apple (Italia)</title>
</head>

<body>

    <!-- Page container -->
    <div class="page-container">

        <!-- NAVBAR container -->
        <nav class="navbar">

            <!-- Links Navbar -->
            <ul class="nav-links">

                <!-- Icona Mela -->
                <li><img src="imgs/apple-logo.svg" alt="Logo apple" class="apple"></li>
                <li><a href="https://www.apple.com/it/store">Store</a></li>
                <li><a href="https://www.apple.com/it/mac/">Mac</a></li>
                <li><a href="https://www.apple.com/it/ipad/">iPad</a></li>
                <li><a href="https://www.apple.com/it/iphone/">iPhone</a></li>
                <li><a href="https://www.apple.com/it/watch/">Watch</a></li>
                <li><a href="https://www.apple.com/it/airpods/">AirPods</a></li>
                <li><a href="https://www.apple.com/it/tv-home/">TV & Casa</a></li>
                <li><a href="https://www.apple.com/it/services/">Intrattenimento</a></li>
                <li><a href="https://www.apple.com/it/shop/accessories/all">Accessori</a></li>
                <li><a href="https://support.apple.com/it-it?cid=gn-ols-home-hp-tab">Supporto</a></li>
                <!-- Icona Lente D'igrandimento -->
                <li><img src="imgs/magnifying-glass.svg" alt="Icona Lente d'ingrandimento" class="magnifying-glass">
                </li>
                <!-- Icona Shop -->
                <li><img src="imgs/shop-bag.svg" alt="Icona Borsa Online" class="shop-bag"></li>
            </ul>

        </nav>

        <!-- Header con Titolo -->
        <header class="Header-container">

            <!-- Titolo Principale -->
            <h1>iPhone</h1>
            <!-- Sottotitolo -->
            <h2>Vieni a conoscere la nuova generazione di iPhone.</h2>

            <!-- Links -->
            <div class="btn-links">
                <a href="https://www.apple.com/it/iphone/" class="left">Scopri di più</a>
                <a href="https://www.apple.com/it/shop/buy-iphone" class="right">Acquista iPhone</a>
            </div>

            <figure class="hero-iphone"></figure>

        </header>

    </div>

</body>
